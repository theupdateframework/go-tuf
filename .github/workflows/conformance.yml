name: TUF Conformance

on:
  push:
  pull_request:
  schedule:
    # Weekly run on Wednesday at 06:30 UTC so the conformance report stays fresh.
    - cron: '30 6 * * 3'

jobs:
  tuf-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build tuf-conformance-client
        run: go build -o tuf-conformance-client ./cmd/tuf-conformance-client

      - uses: theupdateframework/tuf-conformance@v2
        with:
          entrypoint: ./tuf-conformance-client
